<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurisbridge | Web Audio</title>
    <style>
        :root {
            --bg-color: #121212;
            --text-main: #ffffff;
            --accent: #ffb74d;
            --stop-color: #ef5350;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }
        h1 { color: var(--accent); font-size: 2.5rem; margin-bottom: 10px; }
        p { color: #a0a0a0; margin-bottom: 40px; font-size: 1.1rem; }
        
        /* Massive touch target for seniors */
        #toggleBtn {
            background-color: var(--accent);
            color: #000;
            border: none;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            height: 120px;
            font-size: 1.8rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-bottom: 40px;
        }
        #toggleBtn.active {
            background-color: var(--stop-color);
            color: white;
        }

        .slider-container { width: 100%; max-width: 400px; }
        .slider-label { font-size: 1.2rem; margin-bottom: 15px; display: block; }
        
        /* Large slider for accessibility */
        input[type=range] {
            width: 100%;
            height: 40px;
            accent-color: var(--accent);
        }
    </style>
</head>
<body>

    <h1>Aurisbridge</h1>
    <p>Plug in wired headphones for the best experience.</p>

    <button id="toggleBtn">START LISTENING</button>

    <div class="slider-container">
        <span class="slider-label">Clarity Boost (High Frequencies)</span>
        <input type="range" id="claritySlider" min="0" max="25" value="12">
    </div>

    <script>
        let audioContext;
        let microphone;
        let highShelfFilter;
        let safetyLimiter;
        let isListening = false;
        let wakeLock = null;

        const toggleBtn = document.getElementById('toggleBtn');
        const claritySlider = document.getElementById('claritySlider');

        // Feature detection for Wake Lock
        const canWakeLock = 'wakeLock' in navigator;

        async function startAudio() {
            try {
                // 1. Get Microphone Access (Requesting lowest latency possible)
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: { 
                        echoCancellation: false, 
                        noiseSuppression: false, 
                        autoGainControl: false,
                        latency: 0 
                    } 
                });

                // 2. Initialize Web Audio API
                audioContext = new (window.AudioContext || window.webkitAudioContext)({ latencyHint: 'interactive' });
                microphone = audioContext.createMediaStreamSource(stream);

                // 3. Create the High-Frequency Biquad Filter (Clarity)
                highShelfFilter = audioContext.createBiquadFilter();
                highShelfFilter.type = 'highshelf';
                highShelfFilter.frequency.value = 2500; // Boost starts at 2500Hz
                highShelfFilter.gain.value = claritySlider.value; // Connect to slider

                // 4. Create the Safety Limiter (Compressor)
                safetyLimiter = audioContext.createDynamicsCompressor();
                safetyLimiter.threshold.value = -5; // Kick in near max volume
                safetyLimiter.knee.value = 0;
                safetyLimiter.ratio.value = 20; // Squash loud sounds hard
                safetyLimiter.attack.value = 0.001; // React instantly (1ms)
                safetyLimiter.release.value = 0.1;

                // 5. Connect the audio graph: Mic -> Filter -> Limiter -> Headphones
                microphone.connect(highShelfFilter);
                highShelfFilter.connect(safetyLimiter);
                safetyLimiter.connect(audioContext.destination);

                // 6. Keep the screen awake
                if (canWakeLock) {
                    try {
                        wakeLock = await navigator.wakeLock.request('screen');
                    } catch (err) {
                        console.log("Wake Lock failed:", err);
                    }
                }

                // Update UI
                isListening = true;
                toggleBtn.textContent = "STOP LISTENING";
                toggleBtn.classList.add("active");

            } catch (err) {
                alert("Microphone access denied or failed. Please check browser permissions.");
                console.error(err);
            }
        }

        function stopAudio() {
            if (audioContext) {
                audioContext.close(); // Shut down the audio engine
            }
            if (wakeLock !== null) {
                wakeLock.release(); // Let the screen sleep again
                wakeLock = null;
            }
            
            isListening = false;
            toggleBtn.textContent = "START LISTENING";
            toggleBtn.classList.remove("active");
        }

        // Button Click Event
        toggleBtn.addEventListener('click', () => {
            if (!isListening) {
                startAudio();
            } else {
                stopAudio();
            }
        });

        // Slider Change Event (Updates the filter in real-time)
        claritySlider.addEventListener('input', (event) => {
            if (highShelfFilter) {
                highShelfFilter.gain.value = event.target.value;
            }
        });
    </script>
</body>
</html>
