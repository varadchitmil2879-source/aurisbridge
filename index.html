<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurisbridge | Web Audio</title>
    <style>
        :root {
            --bg-color: #121212;
            --text-main: #ffffff;
            --accent: #ffb74d;
            --stop-color: #ef5350;
            --card-bg: #1e1e1e;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }
        h1 { color: var(--accent); font-size: 2.5rem; margin-bottom: 5px; }
        p { color: #a0a0a0; margin-bottom: 30px; font-size: 1.1rem; }
        
        /* Device Selector Styling */
        .controls-card {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            margin-bottom: 30px;
            box-sizing: border-box;
        }

        select {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            margin-bottom: 20px;
            border-radius: 8px;
            background-color: #333;
            color: white;
            border: 1px solid #555;
            font-size: 1rem;
        }

        /* Massive touch target */
        #toggleBtn {
            background-color: var(--accent);
            color: #000;
            border: none;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            height: 120px;
            font-size: 1.8rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-bottom: 30px;
        }
        #toggleBtn.active {
            background-color: var(--stop-color);
            color: white;
        }

        .slider-label { font-size: 1.2rem; margin-bottom: 15px; display: block; }
        
        input[type=range] {
            width: 100%;
            height: 40px;
            accent-color: var(--accent);
        }
    </style>
</head>
<body>

    <h1>Aurisbridge</h1>
    <p>Plug in wired headphones for zero lag.</p>

    <div class="controls-card">
        <label for="micSelect" class="slider-label">Select Microphone:</label>
        <select id="micSelect">
            <option value="">Loading microphones...</option>
        </select>

        <span class="slider-label" style="margin-top: 20px;">Clarity Boost</span>
        <input type="range" id="claritySlider" min="0" max="25" value="12">
    </div>

    <button id="toggleBtn">START LISTENING</button>

    <script>
        let audioContext;
        let microphone;
        let highShelfFilter;
        let safetyLimiter;
        let isListening = false;
        let wakeLock = null;

        const toggleBtn = document.getElementById('toggleBtn');
        const claritySlider = document.getElementById('claritySlider');
        const micSelect = document.getElementById('micSelect');

        // Populate the dropdown with available microphones
        async function loadMicrophones() {
            try {
                // Browsers hide device names until permission is granted once. 
                // We ask for permission silently first, then grab the list.
                const tempStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const devices = await navigator.mediaDevices.enumerateDevices();
                
                micSelect.innerHTML = ''; // Clear the "Loading..." text
                
                const audioInputs = devices.filter(device => device.kind === 'audioinput');
                
                audioInputs.forEach((device, index) => {
                    const option = document.createElement('option');
                    option.value = device.deviceId;
                    // If label is missing, give it a generic name
                    option.text = device.label || `Microphone ${index + 1}`; 
                    micSelect.appendChild(option);
                });

                // Stop the temporary stream so the mic light turns off
                tempStream.getTracks().forEach(track => track.stop());

            } catch (err) {
                micSelect.innerHTML = '<option value="">Microphone access blocked</option>';
                console.error("Error loading mics:", err);
            }
        }

        async function startAudio() {
            try {
                // Grab the exact device ID the user selected from the dropdown
                const selectedDeviceId = micSelect.value;
                
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: { 
                        deviceId: selectedDeviceId ? { exact: selectedDeviceId } : undefined,
                        echoCancellation: false, 
                        noiseSuppression: false, 
                        autoGainControl: false,
                        latency: 0 
                    } 
                });

                audioContext = new (window.AudioContext || window.webkitAudioContext)({ latencyHint: 'interactive' });
                microphone = audioContext.createMediaStreamSource(stream);

                highShelfFilter = audioContext.createBiquadFilter();
                highShelfFilter.type = 'highshelf';
                highShelfFilter.frequency.value = 2500;
                highShelfFilter.gain.value = claritySlider.value;

                safetyLimiter = audioContext.createDynamicsCompressor();
                safetyLimiter.threshold.value = -5;
                safetyLimiter.knee.value = 0;
                safetyLimiter.ratio.value = 20;
                safetyLimiter.attack.value = 0.001;
                safetyLimiter.release.value = 0.1;

                microphone.connect(highShelfFilter);
                highShelfFilter.connect(safetyLimiter);
                safetyLimiter.connect(audioContext.destination);

                if ('wakeLock' in navigator) {
                    try { wakeLock = await navigator.wakeLock.request('screen'); } 
                    catch (err) { console.log("Wake Lock failed:", err); }
                }

                isListening = true;
                toggleBtn.textContent = "STOP LISTENING";
                toggleBtn.classList.add("active");
                micSelect.disabled = true; // Prevent changing mic while active

            } catch (err) {
                alert("Could not start audio. Please check permissions.");
                console.error(err);
            }
        }

        function stopAudio() {
            if (audioContext) {
                audioContext.close();
            }
            if (wakeLock !== null) {
                wakeLock.release();
                wakeLock = null;
            }
            
            isListening = false;
            toggleBtn.textContent = "START LISTENING";
            toggleBtn.classList.remove("active");
            micSelect.disabled = false; // Re-enable dropdown
        }

        toggleBtn.addEventListener('click', () => {
            if (!isListening) {
                startAudio();
            } else {
                stopAudio();
            }
        });

        claritySlider.addEventListener('input', (event) => {
            if (highShelfFilter) {
                highShelfFilter.gain.value = event.target.value;
            }
        });

        // Run this function immediately when the page loads
        window.addEventListener('load', loadMicrophones);
    </script>
</body>
</html>
